apiVersion: v1
kind: ServiceAccount
metadata:
  name: grpc-retry-fun
  namespace: new
  labels:
    app.kubernetes.io/name: grpc-retry-fun
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # Workload Identity binding.
    # Replace "12345" with the actual Azure User-Assigned Managed Identity client ID
    # before deploying, or override via: kubectl annotate serviceaccount grpc-retry-fun \
    #   azure.workload.identity/client-id=<real-client-id> -n new --overwrite
    azure.workload.identity/client-id: "12345"
