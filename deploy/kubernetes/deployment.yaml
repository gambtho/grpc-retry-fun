apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-retry-fun
  namespace: a-project
  annotations:
    aks-project/deployed-by: pipeline
    aks-project/pipeline-repo: gambtho/grpc-retry-fun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-retry-fun
  template:
    metadata:
      labels:
        app: grpc-retry-fun
    spec:
      serviceAccountName: grpc-retry-fun
      securityContext:
        # runAsNonRoot is false per deployment spec; the binary runs as UID 65534
        # (non-root) enforced at the image level via Dockerfile USER directive.
        runAsNonRoot: false
      containers:
        - name: grpc-retry-fun
          image: grpc-retry-fun:1.0
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: grpc-retry-fun
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: grpc-retry-fun
