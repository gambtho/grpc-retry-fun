apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-retry-fun
  namespace: 3-6-8pm
  labels:
    app: grpc-retry-fun
  annotations:
    aks-project/deployed-by: pipeline
    aks-project/pipeline-repo: gambtho/grpc-retry-fun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-retry-fun
  template:
    metadata:
      labels:
        app: grpc-retry-fun
    spec:
      serviceAccountName: grpc-retry-fun
      securityContext:
        runAsNonRoot: false
      containers:
        - name: grpc-retry-fun
          image: grpc-retry-fun:1.0
          ports:
            - name: grpc
              containerPort: 80
              protocol: TCP
          args:
            - "-port"
            - "80"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
            readOnlyRootFilesystem: false
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: grpc-retry-fun
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: grpc-retry-fun
