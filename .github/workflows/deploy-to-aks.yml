name: Deploy to AKS

on:
  workflow_dispatch:
    inputs:
      cluster-name:
        description: "AKS cluster name"
        required: true
        default: "cluster-a"
      resource-group:
        description: "Azure resource group"
        required: true
        default: "pr-314-test-rg"
      namespace:
        description: "Kubernetes namespace"
        required: true
        default: "new"
      subscription-id:
        description: "Azure subscription ID"
        required: true
        default: "d98169bc-2d4a-491b-98cb-b69cbf002eb0"

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

env:
  IMAGE_NAME: grpc-retry-fun

jobs:
  build-and-push:
    name: Build & Push image to ACR
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      acr-login-server: ${{ steps.meta.outputs.acr }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── OIDC login to Azure ─────────────────────────────────────────────────
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.subscription-id }}

      # ── Resolve ACR login server from the subscription ──────────────────────
      - name: Resolve ACR login server
        id: meta
        run: |
          ACR="${{ secrets.ACR_LOGIN_SERVER }}"
          TAG="${{ github.sha }}"
          echo "acr=${ACR}"   >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"   >> "$GITHUB_OUTPUT"

      # ── Authenticate Docker to ACR ──────────────────────────────────────────
      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      # ── Build & push ────────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── OIDC login to Azure ─────────────────────────────────────────────────
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.subscription-id }}

      # ── Set AKS context ─────────────────────────────────────────────────────
      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ inputs.cluster-name }}
          resource-group: ${{ inputs.resource-group }}
          subscription: ${{ inputs.subscription-id }}

      # ── Patch image tag in the deployment manifest before applying ───────────
      - name: Patch image in deployment manifest
        run: |
          IMAGE="${{ needs.build-and-push.outputs.acr-login-server }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}"
          sed -i "s|image: grpc-retry-fun:1.0|image: ${IMAGE}|g" deploy/kubernetes/deployment.yaml
          echo "Deploying image: ${IMAGE}"

      # ── Apply Kubernetes manifests ───────────────────────────────────────────
      - name: Apply manifests
        run: |
          kubectl apply -f deploy/kubernetes/ -n ${{ inputs.namespace }}

      # ── Annotate Deployment with the workflow run URL ────────────────────────
      - name: Annotate deployment with run URL
        run: |
          kubectl annotate deployment --all \
            -n ${{ inputs.namespace }} \
            aks-project/pipeline-run-url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            --overwrite

      # ── Wait for rollout ─────────────────────────────────────────────────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/grpc-retry-fun \
            -n ${{ inputs.namespace }} \
            --timeout=5m
