name: Deploy to AKS

on:
  workflow_dispatch:
    inputs:
      cluster-name:
        description: 'AKS cluster name'
        required: true
        default: 'cluster-a'
      resource-group:
        description: 'Azure resource group'
        required: true
        default: 'pr-314-test-rg'
      namespace:
        description: 'Kubernetes namespace'
        required: true
        default: '3-6-8pm'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ inputs.cluster-name }}
          resource-group: ${{ inputs.resource-group }}

      - name: Deploy to AKS
        run: kubectl apply -f deploy/kubernetes/ -n ${{ inputs.namespace }}

      - name: Annotate deployments with run URL
        run: |
          kubectl annotate deployment --all -n ${{ inputs.namespace }} \
            aks-project/pipeline-run-url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            --overwrite
